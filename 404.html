<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pythoneer</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;height:100%}
    body{
      font-family:"Inter",-apple-system,system-ui,sans-serif;color:#eef2ff;
      background:radial-gradient(900px 600px at 70% -10%,rgba(129,140,248,.22),transparent 60%),linear-gradient(180deg,#0e1422,#0b0f1a);
      display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px
    }
    .glyph{width:72px;height:72px;border-radius:18px;display:grid;place-items:center;overflow:hidden;margin:0 auto 18px;
      background:linear-gradient(160deg,#bfe9ff,#a3d8ff);box-shadow:0 10px 30px rgba(110,231,249,.35),inset 0 0 0 1px rgba(255,255,255,.35)}
    .glyph img{width:62px;height:62px;image-rendering:pixelated;display:block}
    h1{font-family:"Space Grotesk";margin:0 0 6px}
    .big{font-size:clamp(56px,16vw,120px);line-height:1;
      background:linear-gradient(100deg,#6ee7f9,#818cf8 55%,#f0abfc);-webkit-background-clip:text;background-clip:text;color:transparent}
    p{color:#9aa6c4;font-size:16px;line-height:1.5;margin:10px 0 24px;max-width:340px}
    a.btn,span.soon{display:inline-block;font-weight:600;padding:12px 22px;border-radius:999px;text-decoration:none}
    a.btn{color:#0b0f1a;background:linear-gradient(135deg,#6ee7f9,#818cf8)}
    span.soon{color:#9aa6c4;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04)}
    a.home{display:inline-block;color:#eef2ff;text-decoration:none;font-weight:600;padding:11px 20px;border-radius:999px;
      border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04)}
    a.home:hover{background:rgba(255,255,255,.09)}
  </style>
</head>
<body>
  <!-- Default = generic 404. If the path is /w/<id>, the script below swaps in the
       Pythoneer share-link funnel (GitHub Pages has no path routing, so every
       /w/<id> falls through to this 404 page). -->
  <main id="view">
    <h1 class="big">404</h1>
    <p>This page wandered off the grid.</p>
    <a class="home" href="/">&larr; Back home</a>
  </main>

  <script>
    // The deploy step substitutes the real App Store product URL for this token.
    // Until it's a real https:// URL we show a safe "coming soon" state instead of
    // a dead button. See web/check-deploy.sh + LAUNCH.md in the Pythoneer repo.
    var APP_STORE_URL = 'https://apps.apple.com/app/id6754533772';

    var parts = location.pathname.split('/').filter(Boolean);
    if (parts[0] === 'w' && parts[1]) {
      var id = parts[1];
      var cta = /^https:\/\//i.test(APP_STORE_URL)
        ? '<a class="btn" href="' + APP_STORE_URL + '">Download Pythoneer</a>'
        : '<span class="soon">Coming soon to the App Store</span>';
      document.getElementById('view').innerHTML =
        '<div class="glyph"><img src="/assets/pythoneer-icon.png" alt="Pythoneer"></div>' +
        '<h1>Open in Pythoneer</h1>' +
        '<p>Someone shared a world with you. Get Pythoneer to play &amp; remix it.</p>' +
        cta;
      // If the app is installed the universal link already opened it and this page
      // never loaded. As a fallback (scheme registered but link not validated),
      // try the custom scheme so an installed app still receives the world.
      location.href = 'pythoneer://w/' + id;
    }
  </script>
</body>
</html>
