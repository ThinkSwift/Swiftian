home:
  title: Swiftian
  text: |
    Make something new. Push boundaries.
    The journey starts here.

coding:
  title: Create. Explore.
  sections:
    - heading: Start Small, Think Big.
      text: |
        Learning to code often feels overwhelming—huge screens, endless windows, too much space.
        Swiftian simplifies it all. A minimalist, curated coding environment that lets you start small and dream big.
    - heading: Curated, Structured, Effective.
      text: |
        Swiftian isn't just another platform—it's meticulously built to guide you through Swift fundamentals, step by step.
        Each lesson builds upon the last, designed specifically for clarity and hands-on practice.
    - heading: Made for Mobile First.
      text: |
        Currently optimized for iOS, Swiftian’s minimalist design brings coding directly to your fingertips.
        In the future, we’ll explore new directions—whether it’s different languages, platforms, or creative tools—to help your skills grow wherever you go.

universe:
  title: Build Your Universe.
  sections:
    - heading: Why Isn’t Learning Fun?
      text: |
        Coding shouldn't feel like work.
        Yet, it often does—because we lack stories that capture our imagination.
    - heading: Learning Through Immersion.
      text: |
        Mars Rebels is our solution: a curated sci-fi universe designed specifically to make your coding journey immersive and enjoyable.
        Every lesson you complete unlocks new parts of this exciting story.
    - heading: Curated for Creativity.
      text: |
        You’ll have access to handpicked assets, characters, and interactive scenarios designed to enhance your coding skills while you build something uniquely yours.
        Your creativity, empowered.
    - heading: More Than Just Lessons.
      text: |
        We integrate storytelling deeply into your learning experience.
        With Swiftian, you’re not just writing code—you’re building your own adventure.

groove:
  title: Move with the Beat.
  spotify_id: "1R16fshIfz4chEWedPrUak"
  sections:
    - heading: Rhythm Fuels Creativity.
      text: |
        Good music boosts productivity, sharpens focus, and enhances creativity.
        Swiftian incorporates carefully curated soundscapes that synchronize perfectly with your coding rhythm.
    - heading: A Playlist Designed for Creation.
      text: |
        Our music isn't random—it's crafted to inspire.
        With each new project and story, you'll find new beats, tunes, and rhythms, tailored specifically for your creative journey.
    - heading: Music in the DNA of Swiftian.
      text: |
        Sound is essential to creative coding, just like DNA to life.
        Our growing collection of original tracks and soundscapes ensures you'll always have something fresh to move your creativity forward.
    - heading: Continuously Expanding.
      text: |
        Expect regular updates as we add more soundscapes, rhythms, and beats designed exclusively to power your coding experience.

creators:
  title: Made for Creators.
  sections:
    - heading: A Platform Built on Collaboration.
      text: |
        Swiftian thrives when ideas flow freely.
        We’re creating a community that fosters collaboration between coders, artists, designers, and storytellers.
    - heading: Your Ideas Shape Swiftian.
      text: |
        Our platform is dynamic—evolving through your contributions.
        Whether it's a creative asset, a new story, or fresh ideas, your creativity helps shape our shared ecosystem.
    - heading: Built for Growth.
      text: |
        We don't just teach coding; we build relationships.
        We invite creators from all disciplines to connect, collaborate, and collectively push Swiftian forward.
    - heading: More to Come.
      text: |
        This is only the beginning.
        Stay tuned for future updates, new projects, and more ways to be involved. Swiftian is yours to grow.

privacy:
  title: Mission Pilot Privacy Policy
  sections:
    - heading: "Information We Process"
      text: |
        Mission Pilot helps you turn a thought into a small mission card. We collect only the information needed to run the app, protect the service from abuse, and support purchases.

        Mission cards and prompts: The text you enter may be sent to our generation service so the app can create or refine a mission card. Mission cards are stored on your device unless you choose to send text for generation.

        App and device verification data: The app may send an install identifier and an Apple DeviceCheck token to help enforce usage limits and protect the generation service from automated abuse.

        Purchase information: If you buy Mission Pilot Pro, Apple processes the purchase. The app may send signed transaction information to our server so we can verify your subscription and apply Pro generation limits.

        Service logs: Our server may record technical logs such as request time, status code, generation mode, locale, usage counts, and approximate model usage.
    - heading: "How We Use Information"
      bullets:
        - To generate and refine mission cards at your request.
        - To enforce free and Pro usage limits.
        - To verify purchases and restore Pro access.
        - To protect the API from spam, automated abuse, and unauthorized access.
        - To maintain, debug, and improve the app and backend service.
    - heading: "Third-Party Services"
      text: |
        Mission Pilot uses Apple services for App Store purchases and DeviceCheck verification. Mission Pilot also uses Google Cloud services, including Vertex AI and Firestore, to generate mission cards, enforce quota, and operate the backend.
    - heading: "Tracking and Advertising"
      text: |
        Mission Pilot does not use your information for third-party advertising and does not track you across apps or websites owned by other companies.
    - heading: "Data Retention"
      text: |
        Mission cards saved in the app remain on your device until you delete them or uninstall the app. Backend quota records and technical logs are kept only as long as reasonably needed for service operation, fraud prevention, security, legal compliance, and debugging.
    - heading: "Your Choices"
      text: |
        You can delete mission cards inside the app. You can manage or cancel subscriptions through your Apple ID subscription settings. You may contact us with privacy questions through the support page.
    - heading: "Children"
      text: |
        Mission Pilot is not directed to children under 13, and we do not knowingly collect personal information from children under 13.
    - heading: "Changes to This Policy"
      text: |
        We may update this policy when the app, backend, or legal requirements change. Any significant changes will be clearly indicated.
    - heading: "Contact"
      text: |
        For privacy questions, contact us at https://swiftian.com/support/.
  effective_date: "May 25, 2026"

support:
  title: Support
  sections:
    - heading: "Get Help"
      text: |
        We're here to help with any questions or issues you may have with our apps.
        Whether you need technical assistance, have feedback, or want to report a problem, we're happy to hear from you.
    - heading: "Contact Us"
      text: |
        Please reach out to us at: **hello@swiftian.com**
        
        We aim to respond to all inquiries as quickly as possible.
  effective_date: "February 24, 2025"
